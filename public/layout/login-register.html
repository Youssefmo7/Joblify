<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joblify - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Appwrite Inspire Identity Configuration */
        :root {
            --color-primary: #fd366e;
            /* Appwrite pink */
            --color-primary-hover: #e02a5c;
            --color-surface: #ffffff;
            --color-bg: #f8f9fa;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#fd366e',
                        surface: '#ffffff',
                        background: '#f8f9fa',
                        cardborder: '#e1e5eb'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-background text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div
        class="bg-surface w-full max-w-4xl flex flex-col md:flex-row rounded-2xl shadow-sm border border-cardborder overflow-hidden">

        <!-- Left Banner / Branding -->
        <div class="md:w-1/2 p-10 flex flex-col justify-between" style="background-color: var(--color-bg);">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-2">Joblify</h1>
                <p class="text-gray-600 font-medium">Connect. Apply. Get Hired.</p>
            </div>
            <div class="mt-12">
                <h2 class="text-xl font-semibold mb-4">Join our professional community</h2>
                <ul class="space-y-3 text-sm text-gray-600">
                    <li class="flex items-center"><svg class="w-5 h-5 mr-2 text-primary" fill="currentColor"
                            viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd"></path>
                        </svg> Create your profile once</li>
                    <li class="flex items-center"><svg class="w-5 h-5 mr-2 text-primary" fill="currentColor"
                            viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd"></path>
                        </svg> Find relevant opportunities</li>
                    <li class="flex items-center"><svg class="w-5 h-5 mr-2 text-primary" fill="currentColor"
                            viewBox="0 0 20 20">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                clip-rule="evenodd"></path>
                        </svg> Post jobs and review candidates</li>
                </ul>
            </div>
        </div>

        <!-- Right Form Area -->
        <div class="md:w-1/2 p-10">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Create an account</h2>

            <!-- Role Toggle -->
            <div class="flex p-1 mb-6 bg-gray-100 rounded-lg">
                <button
                    class="flex-1 py-2 text-sm font-medium bg-white text-gray-900 rounded-md shadow-sm border border-gray-200">Candidate</button>
                <button
                    class="flex-1 py-2 text-sm font-medium text-gray-600 rounded-md hover:text-gray-900">Employer</button>
            </div>

            <form class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                            placeholder="John">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                            placeholder="Doe">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                        placeholder="john@example.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm"
                        placeholder="••••••••">
                </div>

                <div class="flex items-start mt-4">
                    <input type="checkbox" class="mt-1 h-4 w-4 text-primary rounded border-gray-300">
                    <label class="ml-2 text-sm text-gray-600">I agree to the <a href="#"
                            class="text-primary hover:underline">Terms of Service</a> and <a href="#"
                            class="text-primary hover:underline">Privacy Policy</a>.</label>
                </div>

                <button type="button"
                    class="mt-6 w-full bg-primary hover:bg-pink-600 text-white font-medium py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary text-sm">
                    Create Account
                </button>

                <!-- LinkedIn Bonus Feature -->
                <div class="relative flex py-4 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-xs uppercase tracking-wide">Or connect
                        with</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <button type="button"
                    class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-2 px-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200 flex items-center justify-center text-sm">
                    <svg class="w-5 h-5 mr-2 text-[#0077b5]" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                    </svg>
                    Continue with LinkedIn
                </button>

            </form>

            <p class="mt-6 text-center text-sm text-gray-600">
                Already have an account? <a href="#" class="text-primary font-medium hover:underline">Log in</a>
            </p>
        </div>
    </div>

</body>

</html>
