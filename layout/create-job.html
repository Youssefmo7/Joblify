<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joblify - Post a Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --color-primary: #fd366e; --color-bg: #f4f5f7; }
        body { background-color: var(--color-bg); }
    </style>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#fd366e', surface: '#ffffff', border: '#e8ecf1' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="text-gray-800 font-sans min-h-screen">

    <!-- Navbar -->
    <nav class="bg-surface border-b border-border sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="employer-dashboard.html" class="text-2xl font-bold tracking-tight text-gray-900 border-r border-border pr-4 mr-4">Joblify</a>
                    <span class="text-lg font-semibold text-gray-600">Post a New Job</span>
                </div>
                <div class="flex items-center">
                    <a href="employer-dashboard.html" class="text-sm text-gray-600 hover:text-gray-900 font-medium mr-4">Cancel</a>
                    <button class="bg-primary hover:bg-pink-600 text-white text-sm font-medium py-2 px-5 rounded-lg">Publish Job</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Progress Steps -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center">
                <div class="h-8 w-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-bold">1</div>
                <span class="ml-2 text-sm font-medium text-gray-900">Job Details</span>
            </div>
            <div class="flex-1 mx-4 h-px bg-gray-300"></div>
            <div class="flex items-center">
                <div class="h-8 w-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">2</div>
                <span class="ml-2 text-sm font-medium text-gray-500">Requirements</span>
            </div>
            <div class="flex-1 mx-4 h-px bg-gray-300"></div>
            <div class="flex items-center">
                <div class="h-8 w-8 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center text-sm font-bold">3</div>
                <span class="ml-2 text-sm font-medium text-gray-500">Preview</span>
            </div>
        </div>

        <form class="space-y-6">
            <!-- Job Title -->
            <div class="bg-surface rounded-xl border border-border p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Basic Information</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Job Title <span class="text-red-500">*</span></label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" placeholder="e.g. Senior Frontend Engineer">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Job Description <span class="text-red-500">*</span></label>
                        <textarea rows="6" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary resize-none" placeholder="Describe the role, responsibilities, and what the candidate will be working on..."></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Category <span class="text-red-500">*</span></label>
                            <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary bg-white">
                                <option value="">Select a category</option>
                                <option>Programming</option>
                                <option>Design</option>
                                <option>Management</option>
                                <option>Marketing</option>
                                <option>Sales</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Location <span class="text-red-500">*</span></label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" placeholder="e.g. Mountain View, CA">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Work Type & Deadline -->
            <div class="bg-surface rounded-xl border border-border p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Work Type &amp; Deadline</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Work Type <span class="text-red-500">*</span></label>
                        <div class="flex gap-3">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="work_type" class="sr-only peer" checked>
                                <div class="peer-checked:ring-2 peer-checked:ring-primary peer-checked:border-primary border border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50">
                                    <p class="text-sm font-semibold text-gray-900">Remote</p>
                                    <p class="text-xs text-gray-500 mt-1">Work from anywhere</p>
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="work_type" class="sr-only peer">
                                <div class="peer-checked:ring-2 peer-checked:ring-primary peer-checked:border-primary border border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50">
                                    <p class="text-sm font-semibold text-gray-900">On-site</p>
                                    <p class="text-xs text-gray-500 mt-1">Office based</p>
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="work_type" class="sr-only peer">
                                <div class="peer-checked:ring-2 peer-checked:ring-primary peer-checked:border-primary border border-gray-300 rounded-lg p-4 text-center hover:bg-gray-50">
                                    <p class="text-sm font-semibold text-gray-900">Hybrid</p>
                                    <p class="text-xs text-gray-500 mt-1">Mix of both</p>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Application Deadline <span class="text-red-500">*</span></label>
                            <input type="date" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Experience Level</label>
                            <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary bg-white">
                                <option>Entry Level</option>
                                <option>Mid Level</option>
                                <option selected>Senior Level</option>
                                <option>Director</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tech Stack & Tags -->
            <div class="bg-surface rounded-xl border border-border p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Tech Stack &amp; Tags</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tech Stack</label>
                        <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" placeholder="e.g. Vue.js, TypeScript, GraphQL (comma-separated)">
                        <div class="flex gap-2 mt-2">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700">Vue.js <button class="ml-1.5 text-gray-400 hover:text-gray-600">&times;</button></span>
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700">TypeScript <button class="ml-1.5 text-gray-400 hover:text-gray-600">&times;</button></span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Salary Range</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" placeholder="Min (e.g. 140000)">
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary" placeholder="Max (e.g. 200000)">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Requirements & Benefits -->
            <div class="bg-surface rounded-xl border border-border p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Requirements &amp; Benefits</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Requirements</label>
                        <textarea rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary resize-none" placeholder="List the job requirements (one per line)..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Benefits</label>
                        <textarea rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary resize-none" placeholder="List the benefits offered (one per line)..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Company Branding -->
            <div class="bg-surface rounded-xl border border-border p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Company Branding</h2>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Logo</label>
                    <div class="flex items-center space-x-4">
                        <div class="h-16 w-16 bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center">
                            <svg class="h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <div>
                            <button type="button" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50">Upload Logo</button>
                            <p class="text-xs text-gray-500 mt-1">PNG, JPG or SVG. Max 2MB.</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex justify-between items-center pt-4">
                <button type="button" class="px-6 py-2 border border-gray-300 text-gray-700 font-medium rounded-lg text-sm hover:bg-gray-50">Save as Draft</button>
                <button type="button" class="px-8 py-2.5 bg-primary hover:bg-pink-600 text-white font-medium rounded-lg text-sm">Publish Job</button>
            </div>
        </form>
    </div>
</body>
</html>
